<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NuMarket - Pricing Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
const { useState, useEffect } = React;

// Simple SVG Icon Components
const DollarSign = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
const Users = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>;
const Clock = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
const TrendingUp = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>;
const Calculator = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>;
const Target = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
const Briefcase = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>;
const AlertCircle = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
const Database = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>;


const NuMarketPricingCalculator = () => {
  // ============ NUMARKET SERVICE TIERS ============
  const serviceTiers = {
    insight: { 
      name: 'Insight', 
      retainerMin: 1500, 
      retainerMax: 2500,
      projectMin: 2500,
      description: 'Entry - 1 domain, 1 dashboard, 8 KPIs',
      typicalHours: 15,
      includes: ['Data audit', '1 domain dashboard (8 KPIs)', 'Monthly analysis memo', 'Quarterly strategy review']
    },
    operate: { 
      name: 'Operate', 
      retainerMin: 3500, 
      retainerMax: 12000,
      projectMin: 3500,
      description: 'Mid-market - 4 domains, dedicated data scientist',
      typicalHours: 30,
      includes: ['Up to 4 data domains', 'Dashboard suite', 'Weekly analysis reports', 'Dedicated data scientist', 'Slack/Teams integration', '8hrs/mo ad-hoc included']
    },
    command: { 
      name: 'Command', 
      retainerMin: 10000, 
      retainerMax: 30000,
      projectMin: 10000,
      description: 'Enterprise - unlimited domains, daily briefings',
      typicalHours: 60,
      includes: ['Unlimited domains', 'Custom dashboard suite', 'Daily leadership briefings', 'Dedicated data scientist', 'Board-ready reports', 'Unlimited ad-hoc requests']
    }
  };

  // ============ CLIENT PORTFOLIO ============
  const [clientTierDistribution, setClientTierDistribution] = useState({
    insight: 3,
    operate: 4,
    command: 1
  });

  // Revenue per client based on tier
  const [avgClientRevenue, setAvgClientRevenue] = useState({
    insight: 2000,
    operate: 6000,
    command: 15000
  });

  // ============ TIME & LABOR ============
  const [avgHoursPerClient, setAvgHoursPerClient] = useState({
    insight: 15,
    operate: 30,
    command: 60
  });
  const [dataScientistRate, setDataScientistRate] = useState(85); // Hourly rate for data scientist work
  const [employeeTaxRate, setEmployeeTaxRate] = useState(0.30); // 30% for taxes + benefits
  
  // ============ PLATFORM & INFRASTRUCTURE COSTS (Your COGS) ============
  const [platformCostPerClient, setPlatformCostPerClient] = useState({
    insight: 75,   // Cloud hosting, basic data pipelines, tools for 1 domain
    operate: 250,  // Multi-domain data pipelines, higher compute
    command: 600   // Enterprise-scale infrastructure, custom integrations
  });

  // ============ FIXED OVERHEAD (Monthly) ============
  const [cloudInfrastructure, setCloudInfrastructure] = useState(800); // AWS/GCP base costs
  const [softwareSubscriptions, setSoftwareSubscriptions] = useState(600); // Tableau, data tools, etc.
  const [insurance, setInsurance] = useState(400); // E&O, general liability
  const [officeRent, setOfficeRent] = useState(0);
  const [marketingBudget, setMarketingBudget] = useState(2000);
  const [professionalServices, setProfessionalServices] = useState(750); // Legal, accounting
  const [otherOverhead, setOtherOverhead] = useState(500);

  // ============ ADDITIONAL COSTS ============
  const [equipmentDepreciation, setEquipmentDepreciation] = useState(300);
  const [bankingFees, setBankingFees] = useState(0.029); // 2.9% payment processing
  const [clientAcquisitionCost, setClientAcquisitionCost] = useState(2000); // Cost to land a new client
  const [trainingDevelopment, setTrainingDevelopment] = useState(500);
  const [founderSalary, setFounderSalary] = useState(8000); // Your take-home

  // ============ TEAM & EXPANSION ============
  const [currentDataScientists, setCurrentDataScientists] = useState(2);
  const [monthsToProject, setMonthsToProject] = useState(12);
  const [monthlyClientGrowth, setMonthlyClientGrowth] = useState(1);
  const [clientsPerScientist, setClientsPerScientist] = useState(8); // Capacity threshold

  // ============ CALCULATIONS ============
  
  // Revenue calculations
  const monthlyRevenue = 
    (clientTierDistribution.insight * avgClientRevenue.insight) +
    (clientTierDistribution.operate * avgClientRevenue.operate) +
    (clientTierDistribution.command * avgClientRevenue.command);
  
  // Platform/Infrastructure COGS (your cloud costs, data pipeline costs, etc.)
  const monthlyPlatformCost = 
    (clientTierDistribution.insight * platformCostPerClient.insight) +
    (clientTierDistribution.operate * platformCostPerClient.operate) +
    (clientTierDistribution.command * platformCostPerClient.command);
  
  // Labor costs (data scientist time)
  const totalHoursPerMonth = 
    (clientTierDistribution.insight * avgHoursPerClient.insight) +
    (clientTierDistribution.operate * avgHoursPerClient.operate) +
    (clientTierDistribution.command * avgHoursPerClient.command);
  
  const baseLaborCost = totalHoursPerMonth * dataScientistRate;
  const employeeTaxesCost = baseLaborCost * employeeTaxRate;
  const totalLaborCost = baseLaborCost + employeeTaxesCost + founderSalary;
  
  // Total COGS
  const totalCOGS = monthlyPlatformCost + totalLaborCost;
  
  // Banking/transaction fees
  const monthlyBankingFees = monthlyRevenue * bankingFees;
  
  // Fixed overhead
  const totalFixedOverhead = 
    cloudInfrastructure +
    softwareSubscriptions + 
    insurance + 
    officeRent + 
    marketingBudget + 
    professionalServices + 
    otherOverhead +
    equipmentDepreciation +
    monthlyBankingFees +
    trainingDevelopment;
  
  // Total monthly costs
  const totalMonthlyCost = totalCOGS + totalFixedOverhead;
  
  // Profit metrics
  const monthlyProfit = monthlyRevenue - totalMonthlyCost;
  const profitMargin = monthlyRevenue > 0 ? (monthlyProfit / monthlyRevenue * 100) : 0;
  
  // Calculate variable cost per client by tier
  const variableCostPerClient = {
    insight: platformCostPerClient.insight + (avgHoursPerClient.insight * dataScientistRate * (1 + employeeTaxRate)),
    operate: platformCostPerClient.operate + (avgHoursPerClient.operate * dataScientistRate * (1 + employeeTaxRate)),
    command: platformCostPerClient.command + (avgHoursPerClient.command * dataScientistRate * (1 + employeeTaxRate))
  };
  
  // Contribution margin per client
  const contributionMargin = {
    insight: avgClientRevenue.insight - variableCostPerClient.insight,
    operate: avgClientRevenue.operate - variableCostPerClient.operate,
    command: avgClientRevenue.command - variableCostPerClient.command
  };

  // Break-even: Fixed costs / weighted avg contribution margin
  const totalClients = clientTierDistribution.insight + clientTierDistribution.operate + clientTierDistribution.command;
  const avgContribution = totalClients > 0 ?
    ((contributionMargin.insight * clientTierDistribution.insight) +
     (contributionMargin.operate * clientTierDistribution.operate) +
     (contributionMargin.command * clientTierDistribution.command)) / totalClients : 0;
  
  const breakEvenClients = avgContribution > 0 ? totalFixedOverhead / avgContribution : 0;
  
  // Multi-month projection with growth
  const [projectionData, setProjectionData] = useState([]);
  
  useEffect(() => {
    const data = [];
    let runningClients = totalClients;
    let runningScientists = currentDataScientists;
    let cumulativeRevenue = 0;
    let cumulativeCosts = 0;
    let cumulativeProfit = 0;
    
    for (let month = 1; month <= monthsToProject; month++) {
      // Add new clients
      if (month > 1) {
        runningClients += monthlyClientGrowth;
      }
      
      // Check if we need to hire
      const clientsPerEmployee = runningClients / runningScientists;
      if (clientsPerEmployee > clientsPerScientist && month > 3) {
        runningScientists += 1;
      }
      
      // Distribute clients proportionally across tiers
      const tierRatio = {
        insight: totalClients > 0 ? clientTierDistribution.insight / totalClients : 0.33,
        operate: totalClients > 0 ? clientTierDistribution.operate / totalClients : 0.5,
        command: totalClients > 0 ? clientTierDistribution.command / totalClients : 0.17
      };
      
      const monthClients = {
        insight: Math.round(runningClients * tierRatio.insight),
        operate: Math.round(runningClients * tierRatio.operate),
        command: Math.round(runningClients * tierRatio.command)
      };
      
      // Revenue
      const monthRev = 
        (monthClients.insight * avgClientRevenue.insight) +
        (monthClients.operate * avgClientRevenue.operate) +
        (monthClients.command * avgClientRevenue.command);
      
      // Costs
      const monthPlatform = 
        (monthClients.insight * platformCostPerClient.insight) +
        (monthClients.operate * platformCostPerClient.operate) +
        (monthClients.command * platformCostPerClient.command);
      
      const monthHours = 
        (monthClients.insight * avgHoursPerClient.insight) +
        (monthClients.operate * avgHoursPerClient.operate) +
        (monthClients.command * avgHoursPerClient.command);
      
      const monthLabor = (monthHours * dataScientistRate * (1 + employeeTaxRate)) + founderSalary;
      const monthCOGS = monthPlatform + monthLabor;
      
      const monthBanking = monthRev * bankingFees;
      const monthFixed = cloudInfrastructure + softwareSubscriptions + insurance + officeRent + marketingBudget + 
                        professionalServices + otherOverhead + equipmentDepreciation + 
                        monthBanking + trainingDevelopment;
      
      const monthCost = monthCOGS + monthFixed;
      const monthProfit = monthRev - monthCost;
      
      cumulativeRevenue += monthRev;
      cumulativeCosts += monthCost;
      cumulativeProfit += monthProfit;
      
      data.push({
        month,
        clients: runningClients,
        scientists: runningScientists,
        revenue: monthRev,
        costs: monthCost,
        profit: monthProfit,
        cumulativeRevenue,
        cumulativeCosts,
        cumulativeProfit,
        breakEven: cumulativeProfit >= 0
      });
    }
    
    setProjectionData(data);
  }, [
    monthsToProject, monthlyClientGrowth, clientTierDistribution, avgClientRevenue,
    platformCostPerClient, avgHoursPerClient, dataScientistRate, employeeTaxRate, founderSalary,
    cloudInfrastructure, softwareSubscriptions, insurance, officeRent, marketingBudget, professionalServices,
    otherOverhead, equipmentDepreciation, bankingFees, trainingDevelopment, clientsPerScientist, currentDataScientists, totalClients
  ]);

  const formatCurrency = (num) => {
    return new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: 0,
      maximumFractionDigits: 0,
    }).format(num);
  };

  const StatCard = ({ title, value, subtitle, icon: Icon, color }) => (
    <div className="bg-white rounded-lg shadow p-6 border-l-4" style={{ borderLeftColor: color }}>
      <div className="flex items-center justify-between">
        <div>
          <p className="text-sm text-gray-600 mb-1">{title}</p>
          <p className="text-2xl font-bold" style={{ color }}>{value}</p>
          {subtitle && <p className="text-xs text-gray-500 mt-1">{subtitle}</p>}
        </div>
        <Icon className="w-8 h-8 text-gray-400" />
      </div>
    </div>
  );

  const monthsToBreakEven = projectionData.findIndex(d => d.breakEven);

  return (
    <div className="max-w-7xl mx-auto p-6 bg-gray-50 min-h-screen">
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-2xl font-bold" style={{color: '#0A1520'}}>nu</span>
          <span className="text-2xl font-bold" style={{color: 'oklch(55% 0.17 158)'}}>market</span>
          <span className="text-gray-400 text-lg">—</span>
          <span className="text-gray-600">Pricing & Profitability Calculator</span>
        </div>
        <p className="text-gray-600">Model your data intelligence business across all service tiers</p>
      </div>

      {/* Key Metrics */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <StatCard
          title="Monthly Revenue"
          value={formatCurrency(monthlyRevenue)}
          subtitle={`${totalClients} clients across all tiers`}
          icon={DollarSign}
          color="#10b981"
        />
        <StatCard
          title="Monthly Costs"
          value={formatCurrency(totalMonthlyCost)}
          subtitle={`COGS + Overhead`}
          icon={TrendingUp}
          color="#ef4444"
        />
        <StatCard
          title="Monthly Profit"
          value={formatCurrency(monthlyProfit)}
          subtitle={`${profitMargin.toFixed(1)}% margin`}
          icon={Calculator}
          color={monthlyProfit >= 0 ? "#10b981" : "#ef4444"}
        />
        <StatCard
          title="Break-Even Clients"
          value={Math.ceil(breakEvenClients)}
          subtitle={`${totalClients >= breakEvenClients ? '✓ Profitable' : '⚠ Below break-even'}`}
          icon={Users}
          color="#8b5cf6"
        />
      </div>

      {/* Projection Summary */}
      {projectionData.length > 0 && (
        <div className="bg-white rounded-lg shadow p-6 mb-8">
          <h2 className="text-xl font-bold text-gray-900 mb-4">
            {monthsToProject}-Month Growth Projection
          </h2>
          <div className="grid grid-cols-4 gap-4 mb-4">
            <div className="text-center p-4 bg-blue-50 rounded">
              <p className="text-sm text-gray-600">Total Revenue</p>
              <p className="text-xl font-bold text-blue-600">{formatCurrency(projectionData[projectionData.length - 1].cumulativeRevenue)}</p>
            </div>
            <div className="text-center p-4 bg-red-50 rounded">
              <p className="text-sm text-gray-600">Total Costs</p>
              <p className="text-xl font-bold text-red-600">{formatCurrency(projectionData[projectionData.length - 1].cumulativeCosts)}</p>
            </div>
            <div className="text-center p-4 bg-green-50 rounded">
              <p className="text-sm text-gray-600">Net Profit/Loss</p>
              <p className={`text-xl font-bold ${projectionData[projectionData.length - 1].cumulativeProfit >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                {formatCurrency(projectionData[projectionData.length - 1].cumulativeProfit)}
              </p>
            </div>
            <div className="text-center p-4 bg-purple-50 rounded">
              <p className="text-sm text-gray-600">Months to Break-Even</p>
              <p className="text-xl font-bold text-purple-600">
                {monthsToBreakEven >= 0 ? monthsToBreakEven + 1 : 'Not in period'}
              </p>
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">
              Projection Period: {monthsToProject} months
            </label>
            <input
              type="range"
              min="1"
              max="36"
              value={monthsToProject}
              onChange={(e) => setMonthsToProject(parseInt(e.target.value))}
              className="w-full"
            />
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
        {/* Client Portfolio & Pricing */}
        <div className="bg-white rounded-lg shadow p-6">
          <h2 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <Briefcase className="w-5 h-5" />
            Client Portfolio & Pricing
          </h2>
          
          {/* Tier: Insight */}
          <div className="mb-6 p-4 bg-blue-50 rounded">
            <h3 className="font-bold text-blue-900 mb-2">Insight Tier (Entry)</h3>
            <p className="text-xs text-gray-600 mb-3">{serviceTiers.insight.description}</p>
            <div className="space-y-3">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Clients: {clientTierDistribution.insight}
                </label>
                <input
                  type="range"
                  min="0"
                  max="20"
                  value={clientTierDistribution.insight}
                  onChange={(e) => setClientTierDistribution({...clientTierDistribution, insight: parseInt(e.target.value)})}
                  className="w-full"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Revenue per Client (Monthly)
                </label>
                <input
                  type="number"
                  value={avgClientRevenue.insight}
                  onChange={(e) => setAvgClientRevenue({...avgClientRevenue, insight: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
                <p className="text-xs text-gray-500 mt-1">Typical range: ${serviceTiers.insight.retainerMin.toLocaleString()}-${serviceTiers.insight.retainerMax.toLocaleString()}/mo</p>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Hours per Client/Month
                </label>
                <input
                  type="number"
                  value={avgHoursPerClient.insight}
                  onChange={(e) => setAvgHoursPerClient({...avgHoursPerClient, insight: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Platform Cost per Client
                </label>
                <input
                  type="number"
                  value={platformCostPerClient.insight}
                  onChange={(e) => setPlatformCostPerClient({...platformCostPerClient, insight: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
                <p className="text-xs text-gray-500 mt-1">Your cloud/infra costs</p>
              </div>
              <div className="pt-2 border-t border-blue-200">
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-gray-600">Variable Cost:</span>
                  <span className="font-semibold">{formatCurrency(variableCostPerClient.insight)}</span>
                </div>
                <div className="flex justify-between text-sm">
                  <span className="text-gray-600">Contribution Margin:</span>
                  <span className={`font-bold ${contributionMargin.insight > 0 ? 'text-green-600' : 'text-red-600'}`}>
                    {formatCurrency(contributionMargin.insight)}
                  </span>
                </div>
              </div>
            </div>
          </div>

          {/* Tier: Operate */}
          <div className="mb-6 p-4 bg-green-50 rounded border-2 border-green-300">
            <h3 className="font-bold text-green-900 mb-2">Operate Tier (Mid-Market) ⭐ Most Popular</h3>
            <p className="text-xs text-gray-600 mb-3">{serviceTiers.operate.description}</p>
            <div className="space-y-3">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Clients: {clientTierDistribution.operate}
                </label>
                <input
                  type="range"
                  min="0"
                  max="20"
                  value={clientTierDistribution.operate}
                  onChange={(e) => setClientTierDistribution({...clientTierDistribution, operate: parseInt(e.target.value)})}
                  className="w-full"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Revenue per Client (Monthly)
                </label>
                <input
                  type="number"
                  value={avgClientRevenue.operate}
                  onChange={(e) => setAvgClientRevenue({...avgClientRevenue, operate: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
                <p className="text-xs text-gray-500 mt-1">Typical range: ${serviceTiers.operate.retainerMin.toLocaleString()}-${serviceTiers.operate.retainerMax.toLocaleString()}/mo</p>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Hours per Client/Month
                </label>
                <input
                  type="number"
                  value={avgHoursPerClient.operate}
                  onChange={(e) => setAvgHoursPerClient({...avgHoursPerClient, operate: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Platform Cost per Client
                </label>
                <input
                  type="number"
                  value={platformCostPerClient.operate}
                  onChange={(e) => setPlatformCostPerClient({...platformCostPerClient, operate: parseFloat(e.target.value) || 0})}
                  className="w-full px-3 py-2 border border-gray-300 rounded-md"
                />
                <p className="text-xs text-gray-500 mt-1">Your cloud/infra costs</p>
              </div>
              <div className="pt-2 border-t border-green-200">
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-gray-600">Variable Cost:</span>
                  <span className="font-semibold">{formatCurrency(variableCostPerClient.operate)}</span>
                </div>
                <div className="flex justify-between text-sm">
                  <span className="text-gray-600">Contribution Margin:</span>
                  <span className={`font-bold ${contributionMargin.operate > 0 ? 'text-green-600' : 'text-red-600'}`}>
                    {formatCurrency(contributionMargin.operate)}
                  </span>
                </div>
              </div>
            </div>
          </div>

          {/* Tier: Command */}
          <div className="mb-4 p-4 bg-purple-50 rounded">

            <div className="space-y-3">

        {/* Labor & Team */}

            </div>
            <div>

              </div>

                <span className="font-semibold">{formatCurrency(employeeTaxesCost)}</span>
              </div>

            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">

              />

            <div className="p-3 bg-gray-50 rounded">
              <p className="text-sm text-gray-600">Total Fixed Overhead</p>
              <p className="text-lg font-bold text-gray-900">{formatCurrency(totalFixedOverhead)}</p>

            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">
                Client Acquisition Cost (per new client)
              </label>
              <input
                type="number"
                value={clientAcquisitionCost}
                onChange={(e) => setClientAcquisitionCost(parseFloat(e.target.value) || 0)}

            {projectionData.length > 0 && (

                <div className="space-y-1 text-sm">
                  <p><strong>Final Month ({monthsToProject}):</strong></p>
                  <p>• Clients: {projectionData[projectionData.length - 1].clients.toFixed(0)}</p>
                  <p>• Data Scientists: {projectionData[projectionData.length - 1].scientists}</p>
                  <p>• Monthly Revenue: {formatCurrency(projectionData[projectionData.length - 1].revenue)}</p>
                  <p>• Monthly Profit: {formatCurrency(projectionData[projectionData.length - 1].profit)}</p>
                  <p>• Break-Even: {monthsToBreakEven >= 0 ? `Month ${monthsToBreakEven + 1}` : 'Not achieved'}</p>

        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-3">
            <h3 className="font-semibold text-gray-700 border-b pb-2">COGS (Variable)</h3>
            <div className="flex justify-between items-center p-3 bg-gray-50 rounded">
              <span className="text-gray-700">Platform/Infrastructure</span>
              <span className="font-semibold">{formatCurrency(monthlyPlatformCost)}</span>

            </div>
            <div className="flex justify-between items-center p-3 bg-gray-50 rounded">
              <span className="text-gray-700">All Other Fixed</span>
              <span className="font-semibold">{formatCurrency(insurance + officeRent + professionalServices + otherOverhead + equipmentDepreciation + monthlyBankingFees + trainingDevelopment)}</span>
            </div>
            <div className="flex justify-between items-center p-3 bg-orange-50 rounded border-t-2 border-orange-200">

            </div>

            <span className="font-bold text-red-600 text-2xl">{formatCurrency(totalMonthlyCost)}</span>
          </div>
        </div>
      </div>

      {/* Pricing Recommendations */}
      <div className="bg-gradient-to-br from-green-50 to-blue-50 rounded-lg shadow-lg p-6 mt-8 border-2 border-green-200">

          <AlertCircle className="w-6 h-6 text-green-600 mt-1" />

        <div className="grid grid-cols-3 gap-4">
          <div className="bg-white p-4 rounded-lg border border-blue-200">
            <h3 className="font-bold text-blue-900 mb-2">Insight Tier</h3>
            <div className="space-y-2 text-sm">
              <div className="flex justify-between">
                <span className="text-gray-600">Current Price:</span>
                <span className="font-semibold">{formatCurrency(avgClientRevenue.insight)}</span>
              </div>
              <div className="flex justify-between">
                <span className="text-gray-600">Variable Cost:</span>
                <span className="font-semibold">{formatCurrency(variableCostPerClient.insight)}</span>

              <div className="flex justify-between border-t pt-2">
                <span className="text-gray-900 font-medium">Contribution:</span>
                <span className={`font-bold ${contributionMargin.insight > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {formatCurrency(contributionMargin.insight)}

              </div>
              <div className="flex justify-between">
                <span className="text-gray-600">Margin:</span>
                <span className="font-semibold">{avgClientRevenue.insight > 0 ? ((contributionMargin.insight / avgClientRevenue.insight) * 100).toFixed(1) : 0}%</span>

                <span className="font-semibold">{formatCurrency(avgClientRevenue.operate)}</span>
              </div>
              <div className="flex justify-between">
                <span className="text-gray-600">Variable Cost:</span>
                <span className="font-semibold">{formatCurrency(variableCostPerClient.operate)}</span>
              </div>
              <div className="flex justify-between border-t pt-2">
                <span className="text-gray-900 font-medium">Contribution:</span>
                <span className={`font-bold ${contributionMargin.operate > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {formatCurrency(contributionMargin.operate)}

              <div className="flex justify-between">
                <span className="text-gray-600">Margin:</span>
                <span className="font-semibold">{avgClientRevenue.operate > 0 ? ((contributionMargin.operate / avgClientRevenue.operate) * 100).toFixed(1) : 0}%</span>
              </div>
              <div className="text-xs text-gray-500 mt-2">
                Market range: ${serviceTiers.operate.retainerMin.toLocaleString()}-${serviceTiers.operate.retainerMax.toLocaleString()}/mo

          <div className="bg-white p-4 rounded-lg border border-purple-200">

              <div className="flex justify-between">

                <span className="font-semibold">{formatCurrency(avgClientRevenue.command)}</span>

              <div className="flex justify-between">

              <div className="flex justify-between border-t pt-2">
                <span className="text-gray-900 font-medium">Contribution:</span>
                <span className={`font-bold ${contributionMargin.command > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {formatCurrency(contributionMargin.command)}

              </div>
              <div className="flex justify-between">
                <span className="text-gray-600">Margin:</span>

};
