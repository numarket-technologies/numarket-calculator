<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NuMarket - Business Calculator & Quote Generator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
const { useState, useEffect } = React;

// Simple icons
const HelpCircle = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
const Download = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
const DollarSign = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;

const Tooltip = ({ text }) => {
  const [show, setShow] = useState(false);
  return (
    <div className="relative inline-block ml-1">
      <button
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        onClick={() => setShow(!show)}
        className="text-blue-500 hover:text-blue-600"
      >
        <HelpCircle />
      </button>
      {show && (
        <div className="absolute z-10 w-64 p-3 text-sm bg-gray-900 text-white rounded-lg shadow-lg -top-2 left-6">
          {text}
        </div>
      )}
    </div>
  );
};

const NuMarketCalculator = () => {
  // View state
  const [view, setView] = useState('calculator'); // 'calculator' or 'quote'
  const [showAdvanced, setShowAdvanced] = useState(false);
  
  // Client portfolio (simplified)
  const [insightClients, setInsightClients] = useState(3);
  const [operateClients, setOperateClients] = useState(4);
  const [commandClients, setCommandClients] = useState(1);
  
  // Pricing per tier
  const [insightPrice, setInsightPrice] = useState(2000);
  const [operatePrice, setOperatePrice] = useState(6000);
  const [commandPrice, setCommandPrice] = useState(15000);
  
  // Core costs (visible by default)
  const [dataScientistRate, setDataScientistRate] = useState(85);
  const [founderSalary, setFounderSalary] = useState(8000);
  
  // Advanced costs (hidden by default)
  const [platformCostInsight, setPlatformCostInsight] = useState(75);
  const [platformCostOperate, setPlatformCostOperate] = useState(250);
  const [platformCostCommand, setPlatformCostCommand] = useState(600);
  
  const [hoursInsight, setHoursInsight] = useState(15);
  const [hoursOperate, setHoursOperate] = useState(30);
  const [hoursCommand, setHoursCommand] = useState(60);
  
  const [employeeTaxRate, setEmployeeTaxRate] = useState(0.30);
  const [cloudInfra, setCloudInfra] = useState(800);
  const [software, setSoftware] = useState(600);
  const [insurance, setInsurance] = useState(400);
  const [marketing, setMarketing] = useState(2000);
  const [professional, setProfessional] = useState(750);
  const [other, setOther] = useState(500);
  
  // Calculations
  const monthlyRevenue = 
    (insightClients * insightPrice) +
    (operateClients * operatePrice) +
    (commandClients * commandPrice);
  
  const platformCost = 
    (insightClients * platformCostInsight) +
    (operateClients * platformCostOperate) +
    (commandClients * platformCostCommand);
  
  const totalHours = 
    (insightClients * hoursInsight) +
    (operateClients * hoursOperate) +
    (commandClients * hoursCommand);
  
  const laborCost = (totalHours * dataScientistRate * (1 + employeeTaxRate)) + founderSalary;
  const totalCOGS = platformCost + laborCost;
  
  const fixedOverhead = cloudInfra + software + insurance + marketing + professional + other;
  const totalCost = totalCOGS + fixedOverhead;
  const monthlyProfit = monthlyRevenue - totalCost;
  const profitMargin = monthlyRevenue > 0 ? (monthlyProfit / monthlyRevenue * 100) : 0;
  
  const totalClients = insightClients + operateClients + commandClients;
  
  // Contribution margins
  const insightVarCost = platformCostInsight + (hoursInsight * dataScientistRate * (1 + employeeTaxRate));
  const operateVarCost = platformCostOperate + (hoursOperate * dataScientistRate * (1 + employeeTaxRate));
  const commandVarCost = platformCostCommand + (hoursCommand * dataScientistRate * (1 + employeeTaxRate));
  
  const insightMargin = insightPrice - insightVarCost;
  const operateMargin = operatePrice - operateVarCost;
  const commandMargin = commandPrice - commandVarCost;
  
  const avgMargin = totalClients > 0 ?
    ((insightMargin * insightClients) + (operateMargin * operateClients) + (commandMargin * commandClients)) / totalClients : 0;
  
  const breakEvenClients = avgMargin > 0 ? Math.ceil(fixedOverhead / avgMargin) : 0;
  
  const fmt = (num) => new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 0,
  }).format(num);
  
  // Quote Generator
  const [clientName, setClientName] = useState('');
  const [selectedTier, setSelectedTier] = useState('operate');
  const [customPrice, setCustomPrice] = useState(6000);
  
  const generateQuote = () => {
    const tier = selectedTier;
    const tiers = {
      insight: { name: 'Insight', price: customPrice || insightPrice, hours: hoursInsight, domains: '1', kpis: '8-12' },
      operate: { name: 'Operate', price: customPrice || operatePrice, hours: hoursOperate, domains: '3-6', kpis: '30-50' },
      command: { name: 'Command', price: customPrice || commandPrice, hours: hoursCommand, domains: 'Unlimited', kpis: '100+' }
    };
    
    const selected = tiers[tier];
    
    return `
PROPOSAL FOR ${clientName || '[CLIENT NAME]'}
NuMarket Data Intelligence Services

═══════════════════════════════════════

SERVICE TIER: ${selected.name.toUpperCase()}

MONTHLY INVESTMENT: ${fmt(selected.price)}/month

WHAT'S INCLUDED:
• ${selected.domains} data domain${selected.domains === '1' ? '' : 's'}
• ${selected.kpis} key performance indicators
• ${selected.hours} hours/month of data scientist time
• Automated dashboard${tier === 'insight' ? '' : 's'}
• ${tier === 'insight' ? 'Monthly' : tier === 'operate' ? 'Weekly' : 'Daily'} reporting
• Email support (${tier === 'command' ? '4-hour' : 'same-day'} response)

WHAT YOU'LL GET:
✓ Live dashboard deployed in 6-8 weeks
✓ Training for your team
✓ Ongoing support and maintenance
✓ Data-driven insights to grow your business

INVESTMENT BREAKDOWN:
Monthly Retainer: ${fmt(selected.price)}
Setup/Onboarding: Included
First Invoice: ${fmt(selected.price)} (due upon signature)

CONTRACT TERMS:
• Initial term: 12 months
• Auto-renews monthly thereafter
• 30-day cancellation notice
• Net 15 payment terms

ROI EXPECTATIONS:
Our ${selected.name} tier clients typically see:
• 5-10x return on investment within 6 months
• Better decision-making through data visibility
• Time savings (10+ hrs/week on manual reporting)

NEXT STEPS:
1. Review and approve this proposal
2. Sign Master Service Agreement + SOW
3. Kickoff meeting within 3 business days
4. Dashboard delivery in 6-8 weeks

Questions? Contact:
Brandon Smith
brandon@numarket.com
(415) 555-0200

═══════════════════════════════════════
NuMarket LLC | Data Intelligence Services
www.numarket.us
    `.trim();
  };
  
  return (
    <div className="max-w-6xl mx-auto p-6 bg-gray-50 min-h-screen">
      {/* Header */}
      <div className="mb-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-2xl font-bold text-gray-900">nu</span>
          <span className="text-2xl font-bold text-green-600">market</span>
          <span className="text-gray-400 text-lg">—</span>
          <span className="text-gray-600">Business Calculator</span>
        </div>
        <p className="text-gray-600">Model your profitability & generate client quotes</p>
      </div>
      
      {/* View Toggle */}
      <div className="flex gap-4 mb-6">
        <button
          onClick={() => setView('calculator')}
          className={`px-6 py-2 rounded-lg font-semibold ${view === 'calculator' ? 'bg-green-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}
        >
          💰 Profitability Calculator
        </button>
        <button
          onClick={() => setView('quote')}
          className={`px-6 py-2 rounded-lg font-semibold ${view === 'quote' ? 'bg-green-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}`}
        >
          📄 Quote Generator
        </button>
      </div>
      
      {/* CALCULATOR VIEW */}
      {view === 'calculator' && (
        <div>
          {/* Key Metrics */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div className="bg-white p-4 rounded-lg shadow">
              <p className="text-sm text-gray-600">Monthly Revenue</p>
              <p className="text-2xl font-bold text-green-600">{fmt(monthlyRevenue)}</p>
              <p className="text-xs text-gray-500">{totalClients} clients</p>
            </div>
            <div className="bg-white p-4 rounded-lg shadow">
              <p className="text-sm text-gray-600">Monthly Costs</p>
              <p className="text-2xl font-bold text-red-600">{fmt(totalCost)}</p>
            </div>
            <div className="bg-white p-4 rounded-lg shadow">
              <p className="text-sm text-gray-600">Monthly Profit</p>
              <p className={`text-2xl font-bold ${monthlyProfit >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                {fmt(monthlyProfit)}
              </p>
              <p className="text-xs text-gray-500">{profitMargin.toFixed(1)}% margin</p>
            </div>
            <div className="bg-white p-4 rounded-lg shadow">
              <p className="text-sm text-gray-600">Break-Even</p>
              <p className="text-2xl font-bold text-purple-600">{breakEvenClients}</p>
              <p className="text-xs text-gray-500">clients needed</p>
            </div>
          </div>
          
          {/* Main Input Section */}
          <div className="bg-white rounded-lg shadow p-6 mb-6">
            <h2 className="text-xl font-bold mb-4">Client Portfolio & Pricing</h2>
            
            {/* Insight Tier */}
            <div className="mb-6 p-4 bg-blue-50 rounded-lg">
              <h3 className="font-bold text-blue-900 mb-3 flex items-center">
                Insight Tier (Entry)
                <Tooltip text="Small businesses, 1-2 data sources, monthly reporting. Typical: $1,500-$2,500/mo" />
              </h3>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Clients: {insightClients}</label>
                  <input
                    type="range"
                    min="0"
                    max="20"
                    value={insightClients}
                    onChange={(e) => setInsightClients(parseInt(e.target.value))}
                    className="w-full"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Price/Month</label>
                  <input
                    type="number"
                    value={insightPrice}
                    onChange={(e) => setInsightPrice(parseInt(e.target.value) || 0)}
                    className="w-full px-3 py-2 border rounded"
                  />
                </div>
              </div>
              <div className="mt-2 text-sm">
                <span className="text-gray-600">Margin per client:</span>
                <span className={`ml-2 font-bold ${insightMargin > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {fmt(insightMargin)}
                </span>
              </div>
            </div>
            
            {/* Operate Tier */}
            <div className="mb-6 p-4 bg-green-50 rounded-lg border-2 border-green-300">
              <h3 className="font-bold text-green-900 mb-3 flex items-center">
                Operate Tier (Mid-Market) ⭐
                <Tooltip text="Mid-market companies, 3-6 data sources, weekly reporting. Typical: $3,500-$12,000/mo" />
              </h3>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Clients: {operateClients}</label>
                  <input
                    type="range"
                    min="0"
                    max="20"
                    value={operateClients}
                    onChange={(e) => setOperateClients(parseInt(e.target.value))}
                    className="w-full"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Price/Month</label>
                  <input
                    type="number"
                    value={operatePrice}
                    onChange={(e) => setOperatePrice(parseInt(e.target.value) || 0)}
                    className="w-full px-3 py-2 border rounded"
                  />
                </div>
              </div>
              <div className="mt-2 text-sm">
                <span className="text-gray-600">Margin per client:</span>
                <span className={`ml-2 font-bold ${operateMargin > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {fmt(operateMargin)}
                </span>
              </div>
            </div>
            
            {/* Command Tier */}
            <div className="p-4 bg-purple-50 rounded-lg">
              <h3 className="font-bold text-purple-900 mb-3 flex items-center">
                Command Tier (Enterprise)
                <Tooltip text="Enterprise clients, 8-15+ data sources, daily reporting. Typical: $10,000-$30,000/mo" />
              </h3>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Clients: {commandClients}</label>
                  <input
                    type="range"
                    min="0"
                    max="10"
                    value={commandClients}
                    onChange={(e) => setCommandClients(parseInt(e.target.value))}
                    className="w-full"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Price/Month</label>
                  <input
                    type="number"
                    value={commandPrice}
                    onChange={(e) => setCommandPrice(parseInt(e.target.value) || 0)}
                    className="w-full px-3 py-2 border rounded"
                  />
                </div>
              </div>
              <div className="mt-2 text-sm">
                <span className="text-gray-600">Margin per client:</span>
                <span className={`ml-2 font-bold ${commandMargin > 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {fmt(commandMargin)}
                </span>
              </div>
            </div>
          </div>
          
          {/* Core Costs */}
          <div className="bg-white rounded-lg shadow p-6 mb-6">
            <h2 className="text-xl font-bold mb-4">Core Costs (You + Your Team)</h2>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <label className="block text-sm font-medium mb-1 flex items-center">
                  Data Scientist Hourly Rate
                  <Tooltip text="Your blended rate for analytics work. Includes base salary + benefits + overhead divided by billable hours. Typical: $75-$100/hr" />
                </label>
                <input
                  type="number"
                  value={dataScientistRate}
                  onChange={(e) => setDataScientistRate(parseInt(e.target.value) || 0)}
                  className="w-full px-3 py-2 border rounded"
                />
              </div>
              <div>
                <label className="block text-sm font-medium mb-1 flex items-center">
                  Your Salary/Draw (Monthly)
                  <Tooltip text="What you pay yourself each month. This is your take-home, not profit. Typical: $5K-$10K/mo" />
                </label>
                <input
                  type="number"
                  value={founderSalary}
                  onChange={(e) => setFounderSalary(parseInt(e.target.value) || 0)}
                  className="w-full px-3 py-2 border rounded"
                />
              </div>
            </div>
            <div className="mt-4 p-3 bg-gray-50 rounded text-sm">
              <div className="flex justify-between">
                <span>Total labor hours/month:</span>
                <span className="font-semibold">{totalHours.toFixed(0)} hrs</span>
              </div>
            </div>
          </div>
          
          {/* Advanced Costs Toggle */}
          <button
            onClick={() => setShowAdvanced(!showAdvanced)}
            className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-lg mb-6"
          >
            {showAdvanced ? '▼ Hide Advanced Costs' : '▶ Show Advanced Costs (Platform, Overhead, Taxes)'}
          </button>
          
          {showAdvanced && (
            <div className="space-y-6 mb-6">
              {/* Platform Costs */}
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-xl font-bold mb-4 flex items-center">
                  Platform & Infrastructure Costs
                  <Tooltip text="Your cloud hosting, data pipeline, and tool costs PER CLIENT. These vary by tier complexity." />
                </h2>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">Insight (per client/mo)</label>
                    <input
                      type="number"
                      value={platformCostInsight}
                      onChange={(e) => setPlatformCostInsight(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Operate (per client/mo)</label>
                    <input
                      type="number"
                      value={platformCostOperate}
                      onChange={(e) => setPlatformCostOperate(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Command (per client/mo)</label>
                    <input
                      type="number"
                      value={platformCostCommand}
                      onChange={(e) => setPlatformCostCommand(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                </div>
              </div>
              
              {/* Time per Client */}
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-xl font-bold mb-4 flex items-center">
                  Time Spent per Client
                  <Tooltip text="How many hours/month you spend on each client in each tier. More complex tiers = more time." />
                </h2>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">Insight (hrs/mo)</label>
                    <input
                      type="number"
                      value={hoursInsight}
                      onChange={(e) => setHoursInsight(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Operate (hrs/mo)</label>
                    <input
                      type="number"
                      value={hoursOperate}
                      onChange={(e) => setHoursOperate(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Command (hrs/mo)</label>
                    <input
                      type="number"
                      value={hoursCommand}
                      onChange={(e) => setHoursCommand(parseInt(e.target.value) || 0)}
                      className="w-full px-3 py-2 border rounded"
                    />
                  </div>
                </div>
              </div>
              
              {/* Fixed Overhead */}
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-xl font-bold mb-4 flex items-center">
                  Fixed Overhead (Monthly)
                  <Tooltip text="Costs you pay every month regardless of client count. Insurance, software, marketing, etc." />
                </h2>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">Cloud Infrastructure</label>
                    <input type="number" value={cloudInfra} onChange={(e) => setCloudInfra(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Software Subscriptions</label>
                    <input type="number" value={software} onChange={(e) => setSoftware(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Insurance</label>
                    <input type="number" value={insurance} onChange={(e) => setInsurance(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Marketing</label>
                    <input type="number" value={marketing} onChange={(e) => setMarketing(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Professional Services</label>
                    <input type="number" value={professional} onChange={(e) => setProfessional(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">Other Overhead</label>
                    <input type="number" value={other} onChange={(e) => setOther(parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border rounded" />
                  </div>
                </div>
              </div>
              
              {/* Tax Rate */}
              <div className="bg-white rounded-lg shadow p-6">
                <label className="block text-sm font-medium mb-2 flex items-center">
                  Employee Tax & Benefits Rate: {(employeeTaxRate * 100).toFixed(0)}%
                  <Tooltip text="Payroll taxes (7.65%) + benefits (health insurance, 401k, etc). Typical: 25-35% on top of base salary." />
                </label>
                <input
                  type="range"
                  min="0"
                  max="50"
                  value={employeeTaxRate * 100}
                  onChange={(e) => setEmployeeTaxRate(parseFloat(e.target.value) / 100)}
                  className="w-full"
                />
              </div>
            </div>
          )}
          
          {/* Summary */}
          <div className="bg-white rounded-lg shadow p-6">
            <h2 className="text-xl font-bold mb-4">Monthly Summary</h2>
            <div className="space-y-2">
              <div className="flex justify-between p-2 bg-green-50 rounded">
                <span className="font-semibold">Revenue:</span>
                <span className="font-bold text-green-600">{fmt(monthlyRevenue)}</span>
              </div>
              <div className="flex justify-between p-2 bg-gray-50 rounded">
                <span>Platform Costs:</span>
                <span>{fmt(platformCost)}</span>
              </div>
              <div className="flex justify-between p-2 bg-gray-50 rounded">
                <span>Labor (you + team):</span>
                <span>{fmt(laborCost)}</span>
              </div>
              <div className="flex justify-between p-2 bg-gray-50 rounded">
                <span>Fixed Overhead:</span>
                <span>{fmt(fixedOverhead)}</span>
              </div>
              <div className="flex justify-between p-3 bg-red-50 rounded font-bold border-t-2">
                <span>Total Costs:</span>
                <span className="text-red-600">{fmt(totalCost)}</span>
              </div>
              <div className={`flex justify-between p-3 rounded font-bold text-lg ${monthlyProfit >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                <span>NET PROFIT:</span>
                <span>{fmt(monthlyProfit)}</span>
              </div>
            </div>
          </div>
        </div>
      )}
      
      {/* QUOTE GENERATOR VIEW */}
      {view === 'quote' && (
        <div>
          <div className="bg-white rounded-lg shadow p-6 mb-6">
            <h2 className="text-xl font-bold mb-4">Generate Client Quote</h2>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium mb-1">Client Name</label>
                <input
                  type="text"
                  value={clientName}
                  onChange={(e) => setClientName(e.target.value)}
                  placeholder="e.g., Acme Corp"
                  className="w-full px-3 py-2 border rounded"
                />
              </div>
              <div>
                <label className="block text-sm font-medium mb-1">Service Tier</label>
                <select
                  value={selectedTier}
                  onChange={(e) => setSelectedTier(e.target.value)}
                  className="w-full px-3 py-2 border rounded"
                >
                  <option value="insight">Insight (Entry)</option>
                  <option value="operate">Operate (Mid-Market)</option>
                  <option value="command">Command (Enterprise)</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium mb-1">Monthly Price (leave blank for default)</label>
                <input
                  type="number"
                  value={customPrice}
                  onChange={(e) => setCustomPrice(parseInt(e.target.value) || 0)}
                  placeholder={selectedTier === 'insight' ? '2000' : selectedTier === 'operate' ? '6000' : '15000'}
                  className="w-full px-3 py-2 border rounded"
                />
              </div>
            </div>
          </div>
          
          <div className="bg-gray-900 text-green-400 rounded-lg shadow p-6 font-mono text-sm overflow-auto">
            <pre className="whitespace-pre-wrap">{generateQuote()}</pre>
          </div>
          
          <button
            onClick={() => {
              navigator.clipboard.writeText(generateQuote());
              alert('Quote copied to clipboard!');
            }}
            className="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2"
          >
            <Download />
            Copy Quote to Clipboard
          </button>
        </div>
      )}
    </div>
  );
};

ReactDOM.render(<NuMarketCalculator />, document.getElementById('root'));
  </script>
</body>
</html>
